<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>给zita宝宝的专属惊喜</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #030712; cursor: pointer; }
        canvas { position: absolute; width: 100%; height: 100%; }
        .music-tip { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); color: rgba(189, 224, 254, 0.7); font-size: 11px; font-family: "Microsoft YaHei", sans-serif; z-index: 30; pointer-events: none; transition: opacity 0.8s; background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(189, 224, 254, 0.2); white-space: nowrap; }
    </style>
</head>
<body>
    <div class="music-tip" id="musicTip">🎵 触摸屏幕 开启浪漫《特别的人》并引爆爱心</div>
    <canvas id="heartCanvas"></canvas>

    <audio id="bgMusic" loop preload="auto">
        <source src="https://likepoems.com" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const tips = ["好好爱自己 ❤️", "好好吃饭 🍚", "保持好心情 ☀️", "身体健康 🍎", "顺顺利利 🍀", "别熬夜 🌙", "天凉了多穿衣服 🧥", "我喜欢你"];
        const colors = ["#ffafcc", "#bde0fe", "#a2d2ff", "#ffc6ff", "#e8f5e9", "#fff9c4"];
        
        const stickers = []; let currentStep = 0; let heartFormed = false; let lastGenTime = 0; const genInterval = 40; 

        function getHeartPoints() {
            const points = [];
            for (let i = 0; i < 40; i++) {
                const t = (i / 40) * Math.PI * 2;
                const xVal = 16 * Math.pow(Math.sin(t), 3);
                const yVal = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                
                const scaleX = width < 600 ? 6.5 : 24; 
                const scaleY = width < 600 ? 8.5 : 18;
                const offsetW = width < 600 ? 55 : 90;
                const offsetH = width < 600 ? 25 : 40;
                
                // 🌟 核心美化 1：将手机端初始爱心的重心 Y 轴向上提起 30 个像素，防止整体偏下
                const centerY = width < 600 ? (height / 2 - 30) : (height / 2);
                
                const sx = width / 2 + xVal * scaleX - offsetW;
                const sy = centerY + yVal * scaleY - offsetH;
                points.push({ x: sx, y: sy, idx: i });
            }
            return points;
        }

        let heartPoints = getHeartPoints();

        function toggleAudio() {
            const music = document.getElementById('bgMusic'); const tip = document.getElementById('musicTip');
            if (music.paused) { music.play().then(() => { tip.style.opacity = '1'; tip.innerHTML = "🎵 正在播放《特别的人》"; setTimeout(() => { tip.style.opacity = '0'; }, 2000); }); } 
            else { music.pause(); tip.style.opacity = '1'; tip.innerHTML = "⏸ 音乐已暂停"; }
        }
        document.addEventListener('click', toggleAudio); document.addEventListener('touchstart', toggleAudio, { passive: false });

        function createSticker(pt) {
            const text = pt.idx === 20 ? "我喜欢你 ❤️" : tips[Math.floor(Math.random() * tips.length)];
            const bg = colors[Math.floor(Math.random() * colors.length)];
            let vx = (Math.random() - 0.5) * 0.5; let vy = (Math.random() - 0.5) * 0.5;
            if (Math.abs(vx) < 0.2) vx = vx > 0 ? 0.35 : -0.35; if (Math.abs(vy) < 0.2) vy = vy > 0 ? 0.35 : -0.35;
            stickers.push({ x: pt.x, y: pt.y, vx: vx, vy: vy, text: text, bg: bg });
        }

        function drawCard(s) {
            ctx.save(); ctx.fillStyle = s.bg; ctx.shadowColor = "rgba(0,0,0,0.08)"; ctx.shadowBlur = 4;
            const cardW = width < 600 ? 110 : 180;
            const cardH = width < 600 ? 50 : 80;
            ctx.fillRect(s.x, s.y, cardW, cardH);
            
            ctx.shadowBlur = 0; ctx.fillStyle = "#1e293b";
            const fSize = width < 600 ? "bold 10px" : "bold 14px";
            ctx.font = `${fSize} Microsoft YaHei, sans-serif`;
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText(s.text, s.x + cardW/2, s.y + cardH/2); ctx.restore();
        }

        function mainLoop() {
            ctx.clearRect(0, 0, width, height); const now = Date.now();
            const cardW = width < 600 ? 110 : 180; const cardH = width < 600 ? 50 : 80;

            if (currentStep < heartPoints.length) { if (now - lastGenTime >= genInterval) { createSticker(heartPoints[currentStep]); currentStep++; lastGenTime = now; } } 
            else if (!heartFormed) { setTimeout(() => { heartFormed = true; }, 1500); }

            for (let i = 0; i < stickers.length; i++) {
                const s = stickers[i];
                if (heartFormed) {
                    s.x += s.vx; s.y += s.vy;
                    
                    // 🌟 核心美化 2：加装手机端安全防沉底反弹边界！
                    // 手机端底部安全线扣除 55 像素，给微信控制栏、手势返回栏留出绝对安全区，触墙直接提前强力反弹！
                    const maxBottom = width < 600 ? (height - cardH - 55) : (height - cardH);
                    
                    if (s.x <= 0 || s.x >= width - cardW) s.vx = -s.vx;
                    if (s.y <= 0 || s.y >= maxBottom) s.vy = -s.vy;
                }
                drawCard(s);
            }
            requestAnimationFrame(mainLoop);
        }

        window.addEventListener('resize', () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; heartPoints = getHeartPoints(); });
        mainLoop();
    </script>
</body>
</html>
